name: Build & Publish Docker image

on:
  push:
    branches:
      - '**'
    tags:
      - 'v*.*.*'

jobs:
  build_rust:
    name: Build & Publish
    runs-on: self-hosted
    strategy:
      matrix:
        include: 
          - 
            project: "neko_bin"
            deps: []
      fail-fast: true
      max-parallel: 1
    steps:
      -
        name: Checkout repository
        uses: actions/checkout@v3
      -
        name: Setup Rust toolchain
        uses: actions-rs/toolchain@v1
        with:
          toolchain: nightly
          override: true
      - 
        name: Build Rust project
        uses: actions-rs/cargo@v1
        with:
          command: build
          args: --release -p ${{ matrix.project }}
      -
        name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v2
      -
        name: Login to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
      -
        name: Prepare Docker metadata
        id: meta
        uses: docker/metadata-action@v3
        with:
          images: |
            ghcr.io/atakku/${{ matrix.project }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=ref,event=branch
            type=sha
      -
        name: Create Dockerfile for publishing
        run: |
          echo "FROM docker.io/library/debian:buster-slim" >> Dockerfile
          echo "CMD [\"${{ matrix.project }}\"]" >> Dockerfile
          echo "EXPOSE 8080" >> Dockerfile
          echo "RUN apt-get update && rm -rf /var/lib/apt/lists/*" >> Dockerfile
          echo "COPY target/release/${{ matrix.project }} /usr/local/bin/${{ matrix.project }}" >> Dockerfile
      -
        name: Build Docker & Push container to GHCR
        uses: docker/build-push-action@v3
        with:
          context: .
          builder: ${{ steps.buildx.outputs.name }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
