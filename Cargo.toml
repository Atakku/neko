[workspace]
resolver = "2"
members = ["neko_*", "shared/*"]

[workspace.package]
authors = ["Atakku <atakkudev@gmail.com>"]
edition = "2021"
repository = "https://github.com/Atakku/neko"
license = "MIT OR Apache-2.0"

[workspace.dependencies]
# Actix
actix = "0.13"
actix-files = "0.6"
actix-http = "3.2"
actix-session = "0.7"
actix-web = "4.2"

# Logging
env_logger = "0.10"
log = "0.4"

# Serde
serde = "1"
serde_json = "1"

# Other
lazy_static = "1.4"
mime = "0.3"

# Neko
neko_env = { path = "./shared/neko_env" }